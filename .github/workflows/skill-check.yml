name: Skill Structure Check

on:
  pull_request:
    branches: [main]

jobs:
  skill-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Guard registry files
        run: |
          MERGE_BASE=$(git merge-base HEAD "origin/$GITHUB_BASE_REF")
          if git diff --name-only "$MERGE_BASE" HEAD \
              -- .claude-plugin/marketplace.json .agents/plugins/marketplace.json \
              | grep -q .; then
            echo "ERROR: Do not modify marketplace.json files manually."
            echo "       These files are auto-generated by sync-registry.yml after merge."
            exit 1
          fi

      - name: Check skill structure
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: |
          chmod +x scripts/check-skill-structure.sh
          scripts/check-skill-structure.sh
